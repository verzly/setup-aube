name: Update moving tags

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Resolve release tag
        id: release_tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="$(
              gh api \
                -H "Accept: application/vnd.github+json" \
                /repos/${{ github.repository }}/releases/latest \
                --jq '.tag_name'
            )"
          fi

          if [ -z "${TAG_NAME:-}" ] || [ "${TAG_NAME}" = "null" ]; then
            echo "Failed to resolve release tag."
            exit 1
          fi

          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG_NAME' is not semver like v1.2.3"
            exit 1
          fi

          if ! git rev-parse -q --verify "refs/tags/$TAG_NAME" >/dev/null; then
            echo "Release tag '$TAG_NAME' does not exist in git refs."
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          MAJOR="$(echo "$VERSION" | cut -d. -f1)"
          MINOR="$(echo "$VERSION" | cut -d. -f2)"
          PATCH="$(echo "$VERSION" | cut -d. -f3)"
          TARGET_SHA="$(git rev-list -n 1 "$TAG_NAME")"

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "major_tag=v$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor_tag=v$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

          echo "Resolved release tag: $TAG_NAME"
          echo "Resolved SHA: $TARGET_SHA"

      - name: Move moving tags
        shell: bash
        run: |
          set -euo pipefail

          TARGET_TAG="${{ steps.release_tag.outputs.tag_name }}"
          TARGET_SHA="${{ steps.release_tag.outputs.target_sha }}"
          MAJOR_TAG="${{ steps.release_tag.outputs.major_tag }}"
          MINOR_TAG="${{ steps.release_tag.outputs.minor_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f latest "$TARGET_SHA"
          git tag -f "$MAJOR_TAG" "$TARGET_SHA"
          git tag -f "$MINOR_TAG" "$TARGET_SHA"

          git push origin "refs/tags/latest" --force
          git push origin "refs/tags/$MAJOR_TAG" --force
          git push origin "refs/tags/$MINOR_TAG" --force

          echo "Updated:"
          echo "  latest -> $TARGET_TAG ($TARGET_SHA)"
          echo "  $MAJOR_TAG -> $TARGET_TAG ($TARGET_SHA)"
          echo "  $MINOR_TAG -> $TARGET_TAG ($TARGET_SHA)"
