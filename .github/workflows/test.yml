name: Test Action

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    name: Check whether dist changed
    runs-on: ubuntu-latest
    outputs:
      dist_changed: ${{ steps.diff.outputs.dist_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect dist changes
        id: diff
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"

            if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              echo "Initial push detected, running tests."
              echo "dist_changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "workflow_dispatch detected, running tests."
            echo "dist_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing ${BASE_SHA}...${HEAD_SHA}"

          if git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | grep -qE '^dist/'; then
            echo "dist_changed=true" >> "$GITHUB_OUTPUT"
            echo "dist/ changed"
          else
            echo "dist_changed=false" >> "$GITHUB_OUTPUT"
            echo "dist/ did not change"
          fi

  pr_comment:
    name: Sync PR comment
    needs: changes
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create, update, or delete skip comment
        uses: actions/github-script@v8
        env:
          DIST_CHANGED: ${{ needs.changes.outputs.dist_changed }}
        with:
          script: |
            const marker = '<!-- dist-tests-skipped -->'
            const body = `${marker}
            Tests were not started because the \`dist/\` directory was not modified in this pull request.`

            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const distChanged = process.env.DIST_CHANGED === 'true'

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            )

            const existing = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.includes(marker)
            )

            if (!distChanged) {
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                })
                core.info('Updated existing skip comment.')
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body
                })
                core.info('Created new skip comment.')
              }
            } else {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: existing.id
                })
                core.info('Deleted stale skip comment.')
              } else {
                core.info('No skip comment found.')
              }
            }

  run_tests:
    name: Run dist tests
    needs: changes
    if: ${{ needs.changes.outputs.dist_changed == 'true' }}
    uses: ./.github/workflows/test-dist.yml
